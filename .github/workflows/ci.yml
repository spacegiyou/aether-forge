name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test:all
